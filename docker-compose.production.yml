version: '3.8'

services:
  # ===========================================
  # MongoDB - Baza de date principala
  # Optimizat pentru 128GB RAM server
  # ===========================================
  mongodb:
    image: mongo:6
    container_name: rapoartefirme-mongodb
    restart: always
    ports:
      - "27099:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - rapoartefirme-network
    command: >
      mongod
      --wiredTigerCacheSizeGB 40
      --wiredTigerCollectionBlockCompressor zstd
      --wiredTigerJournalCompressor zstd
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 50G

  # ===========================================
  # Elasticsearch - Motor de cautare fuzzy
  # Optimizat: 8GB heap pentru indexare rapida
  # ===========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: rapoartefirme-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms8g -Xmx8g"
      - cluster.name=rapoartefirme-cluster
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - rapoartefirme-network
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 12G

  # ===========================================
  # Backend - FastAPI
  # 8 workers pentru 12 CPU threads
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: rapoartefirme-backend
    restart: always
    ports:
      - "8002:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/mfirme_local
      - APP_MONGO_URL=mongodb://mongodb:27017/mfirme_app
      - CLOUD_MONGO_URL=${CLOUD_MONGO_URL}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - SECRET_KEY=${SECRET_KEY:-change_this_secret_key_in_production}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - ENVIRONMENT=production
      - UVICORN_WORKERS=8
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - rapoartefirme-network
    deploy:
      resources:
        limits:
          memory: 8G

  # ===========================================
  # Frontend - React (served by Nginx)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        - REACT_APP_BACKEND_URL=
    container_name: rapoartefirme-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rapoartefirme-network

  # ===========================================
  # Nginx - Reverse Proxy
  # Optimizat: auto worker processes
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: rapoartefirme-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - rapoartefirme-network

  # ===========================================
  # Kibana - UI pentru Elasticsearch (optional)
  # ===========================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: rapoartefirme-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - rapoartefirme-network
    profiles:
      - debug

volumes:
  mongodb_data:
  elasticsearch_data:

networks:
  rapoartefirme-network:
    driver: bridge
